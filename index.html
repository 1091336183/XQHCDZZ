<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
<title>小球合成大作战</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a1a;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    color: #fff;
    user-select: none;
    touch-action: manipulation;
  }
  #game-container {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    background: #0a0a1a;
  }
  #top-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5px 10px;
    background: #12122a;
    flex-wrap: wrap;
    gap: 6px;
    flex-shrink: 0;
    border-bottom: 1px solid #1a1a35;
  }
  #title {
    font-size: 17px;
    font-weight: bold;
    background: linear-gradient(135deg, #ffd700, #ff8800);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-right: 8px;
  }
  button {
    padding: 5px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    font-weight: bold;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }
  button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  button:active:not(:disabled) { transform: translateY(0); }
  button:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
  .btn-spawn { background: linear-gradient(135deg, #4CAF50, #388E3C); color: white; }
  .btn-merge-main {
    padding: 4px 14px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: bold;
    border: 1.5px solid #333;
    cursor: default;
    background: #1e1e38;
    color: #555;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-merge-main.ready {
    background: #1a3a2a;
    border-color: #4CAF50;
    color: #4CAF50;
    cursor: pointer;
  }
  .btn-merge-main.ready:hover { background: #2a5a3a; }
  #canvas-wrap {
    flex: 1 1 auto;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background: #0a0a1a;
  }
  canvas {
    display: block;
    border-radius: 4px;
    cursor: default;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    touch-action: manipulation;
  }
  #bottom-bar {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4px 10px;
    background: #12122a;
    gap: 4px;
    flex-shrink: 0;
    border-top: 1px solid #1a1a35;
  }
  .bottom-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: nowrap;
  }
  .btn-upgrade {
    background: linear-gradient(135deg, #9933FF, #7722CC);
    color: white;
  }
  .btn-upgrade-all {
    background: #333;
    color: #888;
    font-size: 11px;
    white-space: nowrap;
  }
  .btn-upgrade-all.ready {
    background: linear-gradient(135deg, #cc33ff, #aa22dd);
    color: white;
  }
  .btn-spawn-upgrade {
    background: #333;
    color: #888;
    font-size: 11px;
    white-space: nowrap;
  }
  .btn-spawn-upgrade.ready {
    background: linear-gradient(135deg, #ff6600, #ff4400);
    color: white;
  }
  .btn-spawn-max-upgrade {
    background: #333;
    color: #888;
    font-size: 11px;
    white-space: nowrap;
  }
  .btn-spawn-max-upgrade.ready {
    background: linear-gradient(135deg, #ff4400, #cc2200);
    color: white;
  }
  .btn-buy-pad { background: #333; color: #888; }
  .btn-buy-pad.ready { background: linear-gradient(135deg, #2266DD, #1155CC); color: white; }
  .btn-spawn-batch { background: #333; color: #666; font-size: 11px; }
  .btn-spawn-batch.unlocked { background: linear-gradient(135deg, #4CAF50, #2E7D32); color: white; }
  .btn-merge-all { background: #333; color: #666; font-size: 11px; }
  .btn-merge-all.unlocked { background: linear-gradient(135deg, #FF6600, #CC4400); color: white; }
  #toast-container {
    position: fixed; top: 10px; left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    display: flex; flex-direction: column; gap: 6px;
    pointer-events: none;
  }
  .toast {
    padding: 7px 16px; border-radius: 5px;
    font-size: 13px; font-weight: bold;
    animation: toastIn 0.3s ease, toastOut 0.3s ease 1.5s forwards;
    text-align: center;
    box-shadow: 0 3px 12px rgba(0,0,0,0.3);
  }
  .toast.success { background: #4CAF50; color: white; }
  .toast.error { background: #e53935; color: white; }
  .toast.info { background: #3399FF; color: white; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes toastOut {
    from { opacity: 1; transform: translateY(0); }
    to { opacity: 0; transform: translateY(-20px); }
  }

  /* ==================== 移动端适配 ==================== */
  @media (max-width: 768px) {
    #top-bar {
      padding: 8px 8px;
      gap: 8px;
    }
    #title {
      font-size: 15px;
    }

    button {
      padding: 8px 12px;
      font-size: 13px;
      min-height: 38px;
      border-radius: 6px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-spawn, .btn-spawn-batch, .btn-merge-main, .btn-merge-all,
    .btn-upgrade, .btn-buy-pad, .btn-spawn-upgrade, .btn-upgrade-all, .btn-spawn-max-upgrade {
      min-height: 38px;
      padding: 8px 10px;
      font-size: 12px;
    }

    #bottom-bar {
      padding: 6px 8px;
      gap: 6px;
    }
    .bottom-row {
      gap: 6px;
      width: 100%;
      justify-content: center;
    }

    .toast {
      font-size: 14px;
      padding: 10px 20px;
      border-radius: 6px;
    }
    #toast-container {
      top: 60px;
      width: 90%;
      max-width: 320px;
    }
  }

  @media (max-width: 480px) {
    #title {
      font-size: 14px;
    }

    button {
      padding: 8px 8px;
      font-size: 11px;
      min-height: 36px;
    }

    .bottom-row {
      gap: 4px;
    }

    .btn-spawn, .btn-spawn-batch, .btn-merge-main, .btn-merge-all,
    .btn-upgrade, .btn-buy-pad, .btn-spawn-upgrade, .btn-upgrade-all, .btn-spawn-max-upgrade {
      padding: 7px 8px;
      font-size: 11px;
      min-height: 36px;
    }

    #toast-container {
      top: 50px;
    }
    .toast {
      font-size: 13px;
      padding: 8px 14px;
    }
  }
  /* 模式选择覆盖层 */
  #mode-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(5,5,20,0.95);
    display: flex; align-items: center; justify-content: center;
    font-family: "Microsoft YaHei", Arial, sans-serif;
  }
  #mode-overlay.hidden { display: none; }
  #mode-panel {
    text-align: center;
    max-width: 460px; width: 90%; padding: 30px 20px;
    background: #12122a; border: 1px solid #2a2a45; border-radius: 16px;
    max-height: 95vh; overflow-y: auto;
  }
  #mode-panel h1 { font-size: 26px; color: #ffd700; margin-bottom: 4px; letter-spacing: 2px; }
  #mode-panel .sub { font-size: 13px; color: #666; margin-bottom: 24px; }
  .btn-m { display: block; width: 100%; padding: 14px; border: none; border-radius: 10px;
    font-size: 17px; font-weight: bold; cursor: pointer; color: #fff; margin-bottom: 10px;
    letter-spacing: 2px; transition: all 0.2s; }
  .btn-m.personal { background: linear-gradient(135deg, #ff9900, #ff6600); color: #000; }
  .btn-m.personal:hover { box-shadow: 0 0 20px rgba(255,153,0,0.4); }
  .btn-m.challenge { background: linear-gradient(135deg, #cc3366, #9933cc); }
  .btn-m.challenge:hover { box-shadow: 0 0 20px rgba(204,51,102,0.4); }
  #challenge-config { display: none; }
  #challenge-config.show { display: block; }
  #challenge-config .cfg-label { font-size: 12px; color: #aaa; margin: 12px 0 6px; text-align: left; }
  .letter-grid2 { display: grid; grid-template-columns: repeat(9,1fr); gap: 5px; }
  @media (max-width: 480px) { .letter-grid2 { grid-template-columns: repeat(6,1fr); } }
  .lt2 { padding: 7px 2px; border: 1px solid #2a2a45; border-radius: 5px; background: #0a0a1a; color: #aaa;
    font-size: 12px; font-weight: bold; cursor: pointer; font-family: inherit; }
  .lt2.active { background: #ff9900; color: #000; border-color: #ff9900; }
  .diff-grid2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 5px; }
  .df2 { padding: 9px 6px; border: 1px solid #2a2a45; border-radius: 5px; background: #0a0a1a; color: #aaa;
    font-size: 12px; cursor: pointer; font-family: inherit; }
  .df2.active { color: #fff; }
  .df2.d0.active { background: #009944; border-color: #009944; }
  .df2.d1.active { background: #ff9900; border-color: #ff9900; }
  .df2.d2.active { background: #cc3333; border-color: #cc3333; }
  .df2.d3.active { background: #9933cc; border-color: #9933cc; }
  .df2.d4.active { background: #336699; border-color: #336699; }
  .custom-inputs { display: none; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
  .custom-inputs.show { display: grid; }
  .custom-inputs label { font-size: 11px; color: #999; }
  .custom-inputs input { width: 100%; padding: 6px 8px; border: 1px solid #2a2a45; border-radius: 5px;
    background: #0a0a1a; color: #ccc; font-size: 12px; font-family: inherit; text-align: center; }
  .btn-start-ch { padding: 12px 30px; border: none; border-radius: 8px; font-size: 15px; font-weight: bold;
    cursor: pointer; background: linear-gradient(135deg,#009944,#00cc66); color: #fff; margin-top: 14px;
    letter-spacing: 2px; transition: all 0.2s; }
  .btn-start-ch:hover { box-shadow: 0 0 20px rgba(0,153,68,0.4); }
  .btn-back { display: inline-block; padding: 6px 16px; border: 1px solid #333; border-radius: 6px;
    background: transparent; color: #888; font-size: 12px; cursor: pointer; margin-top: 10px; }
  .btn-back:hover { color: #aaa; border-color: #555; }
  /* 自定义策略配置 */
  #custom-strategy { display: none; margin-top: 10px; }
  #custom-strategy.show { display: block; }
  .strat-row { margin-bottom: 8px; }
  .strat-row .slabel { font-size: 11px; color: #9966ff; margin-bottom: 3px; display: block; }
  .strat-opts { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
  .strat-opts label {
    display: inline-flex; align-items: center; justify-content: center; gap: 2px;
    padding: 4px 2px; border: 1px solid #2a2a45; border-radius: 4px;
    font-size: 10px; color: #888; cursor: pointer; background: #0a0a1a;
    white-space: nowrap; text-align: center;
  }
  .strat-opts label.checked { border-color: #9966ff; color: #9966ff; background: #1a1a35; }
  .strat-opts input { display: none; }
  .btn-strat-default { padding: 4px 14px; border: 1px solid #444; border-radius: 4px;
    background: transparent; color: #888; font-size: 11px; cursor: pointer; font-family: inherit; margin-top: 4px; }
  .btn-strat-default:hover { border-color: #9966ff; color: #9966ff; }
  /* 胜利对话框 */
  #victory-dialog {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(5,5,20,0.9);
    display: none; align-items: center; justify-content: center;
  }
  #victory-dialog.show { display: flex; }
  .victory-card {
    text-align: center; padding: 30px 24px; max-width: 380px; width: 85%;
    background: #12122a; border: 2px solid #ffd700; border-radius: 16px;
  }
  .victory-card h2 { font-size: 24px; color: #ffd700; margin-bottom: 8px; }
  .victory-card p { font-size: 14px; color: #aaa; margin-bottom: 20px; line-height: 1.6; }
  .victory-card .btn-vic {
    padding: 12px 36px; border: none; border-radius: 8px; font-size: 15px; font-weight: bold;
    cursor: pointer; background: linear-gradient(135deg,#ff9900,#ff6600); color: #000; letter-spacing: 2px;
  }
  .victory-card .btn-vic:hover { box-shadow: 0 0 20px rgba(255,153,0,0.4); }
  /* 通用提示对话框 */
  #alert-dialog {
    position: fixed; inset: 0; z-index: 3000;
    background: rgba(5,5,20,0.92);
    display: none; align-items: center; justify-content: center;
  }
  #alert-dialog.show { display: flex; }
  .alert-card {
    text-align: center; padding: 28px 22px; max-width: 350px; width: 82%;
    background: #12122a; border: 2px solid #ff4444; border-radius: 14px;
  }
  .alert-card p { font-size: 15px; color: #ff6666; margin-bottom: 18px; line-height: 1.5; }
  .alert-card .btn-alert {
    padding: 10px 40px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold;
    cursor: pointer; background: linear-gradient(135deg,#ff4444,#cc0000); color: #fff; letter-spacing: 1px;
  }
  .alert-card .btn-alert:hover { box-shadow: 0 0 16px rgba(255,68,68,0.4); }
  /* 顶部返回按钮 */
  #btn-back-home {
    position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
    padding: 3px 10px; border: 1px solid #333; border-radius: 4px;
    background: transparent; color: #888; font-size: 11px; cursor: pointer;
    font-family: inherit; white-space: nowrap;
  }
  #btn-back-home:hover { color: #ff9900; border-color: #ff9900; }
</style>
</head>
<body>
<!-- 模式选择覆盖层 -->
<div id="mode-overlay">
  <div id="mode-panel">
    <h1>小球合成大作战</h1>
    <p class="sub">选择你的战斗模式</p>
    <button class="btn-m personal" onclick="selectMode('personal')">个人模式</button>
    <button class="btn-m challenge" onclick="showChallengePanel()">挑战模式</button>
    <div id="challenge-config">
      <div class="cfg-label">选择比赛字母关卡：</div>
      <div class="letter-grid2" id="letter-grid2"></div>
      <div class="cfg-label">电脑难度：</div>
      <div class="diff-grid2" id="diff-grid2"></div>
      <div class="custom-inputs" id="custom-inputs">
        <div><label>玩家金币 %</label><input type="number" id="custom-player" value="50" min="5" max="100000"></div>
        <div><label>电脑金币 %</label><input type="number" id="custom-computer" value="200" min="5" max="100000"></div>
      </div>
      <div id="custom-strategy">
        <div class="strat-row">
          <span class="slabel">第一优先（1~3个，不重复）:</span>
          <div class="strat-opts" id="strat-p1"></div>
        </div>
        <div class="strat-row">
          <span class="slabel">第二优先（1~3个，不重复）:</span>
          <div class="strat-opts" id="strat-p2"></div>
        </div>
        <div class="strat-row">
          <span class="slabel">第三优先（1~3个，不重复）:</span>
          <div class="strat-opts" id="strat-p3"></div>
        </div>
        <button class="btn-strat-default" onclick="resetCustomStrategy()">默认（轮流所有功能）</button>
      </div>
      <button class="btn-start-ch" onclick="startChallengeFromPanel()">开始挑战</button>
      <br><button class="btn-back" onclick="backToModeSelect()">返回</button>
    </div>
  </div>
</div>

<!-- 提示对话框 -->
<div id="alert-dialog">
  <div class="alert-card">
    <p id="alert-msg"></p>
    <button class="btn-alert" onclick="closeAlert()">确认</button>
  </div>
</div>

<!-- 胜利对话框 -->
<div id="victory-dialog">
  <div class="victory-card">
    <h2 id="victory-title">胜利！</h2>
    <p id="victory-desc"></p>
    <button class="btn-vic" onclick="onVictoryConfirm()">返回挑战选择</button>
  </div>
</div>

<div id="game-container">
  <div id="top-bar">
    <button id="btn-back-home" onclick="backToHome()">← 首页</button>
    <span id="title">小球合成大作战</span>
  </div>
  <div id="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
  </div>
  <div id="bottom-bar">
    <div class="bottom-row">
      <button class="btn-spawn" id="btn-spawn" onclick="spawnBall()">招募小球</button>
      <button class="btn-spawn-upgrade" id="btn-spawn-upgrade" onclick="upgradeSpawnLevel()">招募小球升级</button>
      <button class="btn-spawn-max-upgrade" id="btn-spawn-max-upgrade" onclick="upgradeSpawnLevelMax()">一键合成升级</button>
    </div>
    <div class="bottom-row">
      <button class="btn-merge-main" id="btn-merge" onclick="doMerge()" disabled>合成</button>
      <button class="btn-spawn-batch locked" id="btn-spawn-batch" onclick="spawnBatch100()" disabled>招募100小球</button>
      <button class="btn-merge-all locked" id="btn-merge-all" onclick="mergeAll()" disabled>一键合成</button>
    </div>
    <div class="bottom-row">
      <button class="btn-buy-pad" id="btn-buy-pad" onclick="buyNextPad()">购买弹跳板</button>
      <button class="btn-upgrade" id="btn-upgrade" onclick="upgradeAllBouncePads()" disabled>升级弹跳板</button>
      <button class="btn-upgrade-all" id="btn-upgrade-all" onclick="upgradeAllBouncePadsMax()" disabled>一键升级</button>
    </div>
  </div>
</div>
<div id="toast-container"></div>

<script>
// ==================== 常量 ====================
const CANVAS_W = 800, CANVAS_H = 520;
const GRAVITY = 0.35;
const BOUNCE_DAMPING = 1.0;
const MAX_BALLS = 100;
const INITIAL_COINS = 0;

// U型墙面：二次贝塞尔曲线(底面)+两侧直线 [基础关专用]
const WALL_TOP_Y = 80;
const WALL_BOT_Y = 400;
const LEFT_X = 180, RIGHT_X = 620;
const BEZIER_P0 = { x: 180, y: 400 };
const BEZIER_P1 = { x: 400, y: 510 };
const BEZIER_P2 = { x: 620, y: 400 };
const CURVE_SAMPLES = 32;

// 字母关卡：离屏Canvas用于像素碰撞检测
const maskCanvas = document.createElement('canvas');
maskCanvas.width = CANVAS_W;
maskCanvas.height = CANVAS_H;
const maskCtx = maskCanvas.getContext('2d');
let maskImageData = null;
const LETTER_FONT = 'bold 420px "Microsoft YaHei", "PingFang SC", Arial';
const LETTER_FONT_VISUAL = 'bold 400px "Microsoft YaHei", "PingFang SC", Arial';

const COLOR_SEQUENCE = ['#808080','#00CC66','#3399FF','#9933FF','#FF8800','#FF3333','#FFD700'];
const HALF_W = CANVAS_W / 2; // 400px 半屏宽度

// 挑战模式专用：半区遮罩Canvas（用于letter碰撞检测）
const halfMaskCanvas = document.createElement('canvas');
halfMaskCanvas.width = HALF_W;
halfMaskCanvas.height = CANVAS_H;
const halfMaskCtx = halfMaskCanvas.getContext('2d');
let playerMaskImageData = null;
let computerMaskImageData = null;

// 弹跳板购买金币自动递增
function getUnlockCost(padId) {
  if (padId === 0) return 0;
  return 400 + padId * 100;
}

// ==================== Canvas ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const scale = Math.min(wrap.clientWidth / CANVAS_W, wrap.clientHeight / CANVAS_H);
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  canvas.style.width = (CANVAS_W * scale) + 'px';
  canvas.style.height = (CANVAS_H * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ==================== 字母关卡：像素遮罩系统 ====================
function updateLetterMask(letter) {
  maskCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  maskCtx.fillStyle = '#ffffff';
  maskCtx.font = LETTER_FONT;
  maskCtx.textAlign = 'center';
  maskCtx.textBaseline = 'middle';
  maskCtx.fillText(letter, CANVAS_W / 2, CANVAS_H / 2 + 12);
  maskImageData = maskCtx.getImageData(0, 0, CANVAS_W, CANVAS_H);
}

function maskAlpha(x, y) {
  const ix = Math.floor(x);
  const iy = Math.floor(y);
  if (ix < 0 || ix >= CANVAS_W || iy < 0 || iy >= CANVAS_H) return 0;
  if (!maskImageData) return 0;
  return maskImageData.data[(iy * CANVAS_W + ix) * 4 + 3];
}

// 获取字母遮罩在(x,y)处的梯度（指向内部）
function maskGradient(x, y, d) {
  const l = maskAlpha(x - d, y);
  const r = maskAlpha(x + d, y);
  const t = maskAlpha(x, y - d);
  const b = maskAlpha(x, y + d);
  return { gx: r - l, gy: b - t };
}

// ==================== 挑战模式：半区字母遮罩系统 ====================
function updateHalfLetterMask(letter, isPlayer) {
  halfMaskCtx.clearRect(0, 0, HALF_W, CANVAS_H);
  halfMaskCtx.fillStyle = '#ffffff';
  halfMaskCtx.font = LETTER_FONT;
  halfMaskCtx.textAlign = 'center';
  halfMaskCtx.textBaseline = 'middle';
  halfMaskCtx.fillText(letter, HALF_W / 2, CANVAS_H / 2 + 12);
  const imageData = halfMaskCtx.getImageData(0, 0, HALF_W, CANVAS_H);
  if (isPlayer) {
    playerMaskImageData = imageData;
  } else {
    computerMaskImageData = imageData;
  }
}

function halfMaskAlpha(ix, iy, imageData) {
  if (ix < 0 || ix >= HALF_W || iy < 0 || iy >= CANVAS_H) return 0;
  if (!imageData) return 0;
  return imageData.data[(iy * HALF_W + ix) * 4 + 3];
}

function halfMaskGradient(x, y, d, imageData) {
  const l = halfMaskAlpha(Math.floor(x - d), y, imageData);
  const r = halfMaskAlpha(Math.floor(x + d), y, imageData);
  const t = halfMaskAlpha(x, Math.floor(y - d), imageData);
  const b = halfMaskAlpha(x, Math.floor(y + d), imageData);
  return { gx: r - l, gy: b - t };
}

// 挑战模式下的字母碰撞解决（通用，用于玩家或电脑）
// xOffset: 0 for player (x in 0-400), 400 for computer (x in 400-800)
function resolveHalfLetterCollision(ball, bouncePads, bouncePadLevel, stateObj, isPlayer) {
  const imageData = isPlayer ? playerMaskImageData : computerMaskImageData;
  if (!imageData) return;
  const xOffset = isPlayer ? 0 : HALF_W;
  const localX = ball.x - xOffset;

  const r = ball.radius;
  const sampleCount = 16;
  let collisionInfo = null;

  for (let i = 0; i < sampleCount; i++) {
    const angle = (i / sampleCount) * Math.PI * 2;
    const sx = localX + Math.cos(angle) * (r + 0.5);
    const sy = ball.y + Math.sin(angle) * (r + 0.5);
    if (!halfMaskAlpha(Math.floor(sx), Math.floor(sy), imageData)) {
      collisionInfo = { x: sx, y: sy, angle };
      break;
    }
  }

  if (collisionInfo) {
    const d = 6;
    const grad = halfMaskGradient(collisionInfo.x, collisionInfo.y, d, imageData);
    let nx = grad.gx;
    let ny = grad.gy;
    const len = Math.sqrt(nx * nx + ny * ny);
    if (len > 0.001) {
      nx /= len; ny /= len;
    } else {
      nx = -Math.cos(collisionInfo.angle);
      ny = -Math.sin(collisionInfo.angle);
    }
    if (!halfMaskAlpha(Math.floor(collisionInfo.x + nx * 8), Math.floor(collisionInfo.y + ny * 8), imageData)) {
      nx = -nx; ny = -ny;
    }

    ball.x += nx * (r + 1);
    ball.y += ny * (r + 1);

    const dot = ball.vx * nx + ball.vy * ny;
    if (dot < 0) {
      ball.vx = (ball.vx - 2 * dot * nx) * BOUNCE_DAMPING;
      ball.vy = (ball.vy - 2 * dot * ny) * BOUNCE_DAMPING;
      perturbVelocity(ball);
    }

    if (!ball._letterRewarded) {
      for (const pad of bouncePads) {
        if (!pad.unlocked || pad.type !== 'letter') continue;
        const dx = (collisionInfo.x + xOffset) - pad.x;
        const dy = collisionInfo.y - pad.y;
        const pd = Math.sqrt(dx * dx + dy * dy);
        if (pd < 40) {
          ball._letterRewarded = true;
          if (isPlayer) {
            addCoins(getWallCoinReward(ball.level) * bouncePadLevel * getCoinMultiplier());
          } else {
            addCoinsToComputer(getWallCoinReward(ball.level) * bouncePadLevel * getCoinMultiplierFor(stateObj));
          }
          spawnHalfParticles(collisionInfo.x + xOffset, collisionInfo.y, getPadColor(bouncePadLevel), 5, isPlayer);
          break;
        }
      }
    }
  }

  // 安全网
  if (!halfMaskAlpha(Math.floor(localX), Math.floor(ball.y), imageData)) {
    for (let searchD = 3; searchD < 150; searchD += 4) {
      let found = false;
      for (let a = 0; a < Math.PI * 2; a += 0.2) {
        const tx = localX + Math.cos(a) * searchD;
        const ty = ball.y + Math.sin(a) * searchD;
        if (halfMaskAlpha(Math.floor(tx), Math.floor(ty), imageData)) {
          ball.x = tx + xOffset;
          ball.y = ty;
          ball.vx = Math.cos(a) * 3;
          ball.vy = Math.sin(a) * 3;
          found = true;
          break;
        }
      }
      if (found) break;
    }
  }
}

// 查找字母轮廓边界点（用于弹跳板布局）
function findLetterOutlinePads() {
  const pads = [];
  // 搜索字母轮廓点
  const boundaryPoints = [];
  const step = 3;
  // 上下边界
  for (let x = 4; x < CANVAS_W - 4; x += step) {
    for (let y = 4; y < CANVAS_H - 4; y++) {
      if (maskAlpha(x, y)) { boundaryPoints.push({ x, y, region: 'top' }); break; }
    }
    for (let y = CANVAS_H - 5; y >= 4; y--) {
      if (maskAlpha(x, y)) { boundaryPoints.push({ x, y, region: 'bottom' }); break; }
    }
  }
  // 左右边界
  for (let y = 4; y < CANVAS_H - 4; y += step) {
    for (let x = 4; x < CANVAS_W - 4; x++) {
      if (maskAlpha(x, y)) { boundaryPoints.push({ x, y, region: 'left' }); break; }
    }
    for (let x = CANVAS_W - 5; x >= 4; x--) {
      if (maskAlpha(x, y)) { boundaryPoints.push({ x, y, region: 'right' }); break; }
    }
  }

  if (boundaryPoints.length === 0) return pads;

  // 按角度排序轮廓点（相对于中心），形成连续轮廓
  let cx = 0, cy = 0;
  for (const p of boundaryPoints) { cx += p.x; cy += p.y; }
  cx /= boundaryPoints.length; cy /= boundaryPoints.length;
  boundaryPoints.sort((a, b) => Math.atan2(a.y - cy, a.x - cx) - Math.atan2(b.y - cy, b.x - cx));

  // 均匀采样9个点
  const n = 9;
  for (let i = 0; i < n; i++) {
    const idx = Math.floor((i / n) * boundaryPoints.length);
    const pt = boundaryPoints[idx];
    pads.push({ x: pt.x, y: pt.y, region: pt.region });
  }

  // 找到"字母最大面积上面最中间位置"——顶部最靠近中心的轮廓点作为默认弹跳板
  // 将第一个弹跳板放在字母顶部最中心的位置
  let bestTop = null, bestTopDist = Infinity;
  for (const bp of boundaryPoints) {
    if (bp.region === 'top') {
      const d = Math.abs(bp.x - CANVAS_W / 2);
      if (d < bestTopDist) { bestTopDist = d; bestTop = bp; }
    }
  }
  if (bestTop) {
    pads[0] = { x: bestTop.x, y: bestTop.y, region: 'top' };
  }
  return pads;
}

// 初始化字母关卡弹跳板
function initLetterBouncePads() {
  const letter = getStageName(gameState.currentStage);
  updateLetterMask(letter);
  const padPts = findLetterOutlinePads();
  // 按y降序排列，最下方的弹跳板排最前面（id=0自动解锁）
  padPts.sort((a, b) => b.y - a.y);
  gameState.bouncePads = padPts.map((pt, i) => ({
    id: i,
    x: pt.x,
    y: pt.y,
    unlocked: i < 5,
    type: 'letter'
  }));
}

// ==================== 字母关卡碰撞检测 ====================
function resolveLetterCollision(ball) {
  if (gameState.currentStage === 0 || !maskImageData) return;

  const r = ball.radius;
  const sampleCount = 16;
  let collisionInfo = null;

  // 检测球表面16个点
  for (let i = 0; i < sampleCount; i++) {
    const angle = (i / sampleCount) * Math.PI * 2;
    const sx = ball.x + Math.cos(angle) * (r + 0.5);
    const sy = ball.y + Math.sin(angle) * (r + 0.5);
    if (!maskAlpha(sx, sy)) {
      collisionInfo = { x: sx, y: sy, angle };
      break;
    }
  }

  if (collisionInfo) {
    // 估算碰撞点法线（指向字母内部）
    const d = 6;
    const grad = maskGradient(collisionInfo.x, collisionInfo.y, d);
    let nx = grad.gx;
    let ny = grad.gy;
    const len = Math.sqrt(nx * nx + ny * ny);
    if (len > 0.001) {
      nx /= len; ny /= len;
    } else {
      nx = -Math.cos(collisionInfo.angle);
      ny = -Math.sin(collisionInfo.angle);
    }
    // 验证法线方向：沿法线方向走一小段应该在内部
    if (!maskAlpha(collisionInfo.x + nx * 8, collisionInfo.y + ny * 8)) {
      nx = -nx; ny = -ny;
    }

    // 把球推回字母内部
    ball.x += nx * (r + 1);
    ball.y += ny * (r + 1);

    // 速度反射（球朝墙运动时 v·N < 0 → 反射）
    const dot = ball.vx * nx + ball.vy * ny;
    if (dot < 0) {
      ball.vx = (ball.vx - 2 * dot * nx) * BOUNCE_DAMPING;
      ball.vy = (ball.vy - 2 * dot * ny) * BOUNCE_DAMPING;
      perturbVelocity(ball);
    }

    // 弹跳板金币奖励检测
    if (!ball._letterRewarded) {
      for (const pad of gameState.bouncePads) {
        if (!pad.unlocked || pad.type !== 'letter') continue;
        const dx = collisionInfo.x - pad.x;
        const dy = collisionInfo.y - pad.y;
        const pd = Math.sqrt(dx * dx + dy * dy);
        if (pd < 40) {
          ball._letterRewarded = true;
          addCoins(getWallCoinReward(ball.level) * gameState.bouncePadLevel * getCoinMultiplier());
          spawnParticles(collisionInfo.x, collisionInfo.y, getPadColor(gameState.bouncePadLevel), 5);
          break;
        }
      }
    }
  }

  // 安全网：球心跑出字母外部，送回内部
  if (!maskAlpha(ball.x, ball.y)) {
    for (let searchD = 3; searchD < 150; searchD += 4) {
      let found = false;
      for (let a = 0; a < Math.PI * 2; a += 0.2) {
        const tx = ball.x + Math.cos(a) * searchD;
        const ty = ball.y + Math.sin(a) * searchD;
        if (maskAlpha(tx, ty)) {
          ball.x = tx;
          ball.y = ty;
          ball.vx = Math.cos(a) * 3;
          ball.vy = Math.sin(a) * 3;
          found = true;
          break;
        }
      }
      if (found) break;
    }
  }
}

// ==================== 预计算贝塞尔曲线离散点 [基础关] ====================
function bezierPoint(t) {
  const mt = 1 - t;
  return {
    x: mt * mt * BEZIER_P0.x + 2 * mt * t * BEZIER_P1.x + t * t * BEZIER_P2.x,
    y: mt * mt * BEZIER_P0.y + 2 * mt * t * BEZIER_P1.y + t * t * BEZIER_P2.y
  };
}

function getCurveYForX(x) {
  if (x <= LEFT_X) return BEZIER_P0.y;
  if (x >= RIGHT_X) return BEZIER_P2.y;
  let lo = 0, hi = 1;
  for (let i = 0; i < 24; i++) {
    const mid = (lo + hi) / 2;
    if (bezierPoint(mid).x < x) lo = mid;
    else hi = mid;
  }
  return bezierPoint((lo + hi) / 2).y;
}

const curvePoints = [];
for (let i = 0; i <= CURVE_SAMPLES; i++) {
  curvePoints.push(bezierPoint(i / CURVE_SAMPLES));
}

const curveSegments = [];
for (let i = 0; i < CURVE_SAMPLES; i++) {
  const p0 = curvePoints[i];
  const p1 = curvePoints[i + 1];
  const dx = p1.x - p0.x;
  const dy = p1.y - p0.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  const nx = -dy / len;
  const ny = dx / len;
  const dotUp = (p0.y + p1.y) / 2 - 400;
  curveSegments.push({
    x1: p0.x, y1: p0.y, x2: p1.x, y2: p1.y,
    nx: ny > 0 ? nx : -nx,
    ny: ny > 0 ? ny : -ny,
    len: len
  });
}

// ==================== 关卡系统 ====================
const STAGE_LABELS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
function getStageName(stage) {
  if (stage === 0) return '';
  return STAGE_LABELS[stage - 1];
}
function getStageFullName(stage) {
  const suffix = getStageName(stage);
  return '第' + stage + '关' + (suffix ? ' ' + suffix : '');
}

function nextStage() {
  if (gameState.currentStage >= 26) {
    gameState.currentStage = 0;

  gameState.particles = [];

    });

function getDefaultPadPosition() {
  if (gameState.currentStage === 0) return { x: 370, y: WALL_TOP_Y - 40 };
  // 字母关卡：找最下方的弹跳板作为默认位置
  let best = null;
  for (const p of gameState.bouncePads) {
    if (!best || p.y > best.y) best = p;
  }
  if (best) return { x: best.x, y: best.y - 30 };
  return { x: CANVAS_W / 2, y: CANVAS_H / 2 };
}

// ==================== 持久缓存 ====================
const SAVE_KEY = 'ball_merge_save_v1';

function saveGame() {
  if (gameState.mode === 'challenge') return; // 挑战模式不保存
  try {
    const data = {
      coins: gameState.coins,
      balls: gameState.balls.map(b => ({ x: b.x, y: b.y, vx: b.vx, vy: b.vy, level: b.level, radius: b.radius, isActive: b.isActive })),
      bouncePadLevel: gameState.bouncePadLevel,
      bouncePads: gameState.bouncePads.map(p => {
        const base = { id: p.id, unlocked: p.unlocked, type: p.type };
        if (p.type === 'curve') { base.tStart = p.tStart; base.tEnd = p.tEnd; }
        if (p.type === 'wall') { base.side = p.side; base.yStart = p.yStart; base.yEnd = p.yEnd; }
        if (p.type === 'letter') { base.x = p.x; base.y = p.y; }
        return base;
      }),
      currentStage: gameState.currentStage,
      spawnLevel: gameState.spawnLevel
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    gameState.coins = data.coins || INITIAL_COINS;
    gameState.balls = (data.balls || []).map(b => ({ ...b, color: getBallColor(b.level) }));
    gameState.bouncePadLevel = data.bouncePadLevel || 1;
    gameState.bouncePads = data.bouncePads || [];
    gameState.currentStage = data.currentStage || 0;
    gameState.spawnLevel = data.spawnLevel || 1;
    gameState.particles = [];
    // 字母关卡需要重建遮罩
    if (gameState.currentStage > 0) {
      updateLetterMask(getStageName(gameState.currentStage));
    }
    return true;
  } catch(e) {
    return false;
  }
}

// ==================== 辅助函数 ====================
function getBallColor(lv) { return COLOR_SEQUENCE[(lv - 1) % 7]; }
function getPadColor(lv) {
  if (lv === 1) return '#808080';
  if (lv === 2) return '#00CC66';
  return COLOR_SEQUENCE[(lv - 1) % 7];
}
function getWallCoinReward(lv) {
  if (lv <= 5) return 1 + (lv - 1) * 3;
  if (lv <= 10) return 17 + (lv - 6) * 4;
  return lv + 1;
}
function getMergeCost(lv) {
  if (lv === 1) return 10;
  if (lv === 2) return 40;
  return lv * lv * 2;
}
function getUpgradeCost(curLv) {
  if (curLv === 1) return 10000;
  if (curLv === 2) return 15000;
  return 10000 + (curLv - 1) * 5000;
}
function addCoins(amt) { gameState.coins += Math.round(amt * gameState.playerCoinMult * 100000) / 100000; }

function getHighestLevel() {
  if (gameState.balls.length === 0) return 1;
  let max = 0;
  for (const b of gameState.balls) { if (b.level > max) max = b.level; }
  return max;
}
function getCoinMultiplier() { return 1 + getHighestLevel() * 0.1; }
function getCoinMultiplierFor(state) { return 1 + getHighestLevelFor(state) * 0.1; }
function getHighestLevelFor(state) {
  if (!state || state.balls.length === 0) return 1;
  let max = 0;
  for (const b of state.balls) { if (b.level > max) max = b.level; }
  return max;
}
function addCoinsToComputer(amt) {
  if (!gameState.computer) return;
  gameState.computer.coins += Math.round(amt * gameState.computerCoinMult * 100000) / 100000;
}

// 挑战模式粒子：根据isPlayer决定存入哪个粒子数组
function spawnHalfParticles(x, y, color, count, isPlayer) {
  const target = isPlayer ? gameState.particles : (gameState.computer ? gameState.computer.particles : null);
  if (!target) return;
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1 + Math.random() * 3;
    target.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 1, decay: 0.025 + Math.random() * 0.04,
      color, size: 2 + Math.random() * 3
    });
  }
}

function updateComputerParticles() {
  if (!gameState.computer) return;
  const ps = gameState.computer.particles;
  for (let i = ps.length - 1; i >= 0; i--) {
    const p = ps[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05;
    p.life -= p.decay;
    if (p.life <= 0) ps.splice(i, 1);
  }
}

function formatGold(n) {
  // 处理科学计数法和异常值
  if (!isFinite(n) || isNaN(n)) return '0';
  // 界面只显示两位小数
  if (n < 10000) return parseFloat(n.toFixed(2)).toString();
  if (n < 1000000) {
    const v = n / 10000;
    return (v % 1 === 0 ? v.toFixed(0) : parseFloat(v.toFixed(2)).toString()) + '万';
  }
  if (n < 100000000) {
    return (n / 10000).toFixed(0) + '万';
  }
  const v = n / 100000000;
  return (v % 1 === 0 ? v.toFixed(0) : parseFloat(v.toFixed(2)).toString()) + '亿';
}

// ==================== 粒子 ====================
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1 + Math.random() * 3;
    gameState.particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 1, decay: 0.025 + Math.random() * 0.04,
      color, size: 2 + Math.random() * 3
    });
  }
}
function updateParticles() {
  for (let i = gameState.particles.length - 1; i >= 0; i--) {
    const p = gameState.particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05;
    p.life -= p.decay;
    if (p.life <= 0) gameState.particles.splice(i, 1);
  }
}
function renderParticles() {
  for (const p of gameState.particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function upgradeSpawnLevel() {
  const curLv = gameState.spawnLevel;
  const cost = curLv * curLv * 100000;
  if (gameState.coins < cost) {
    showToast('金币不足！需要 ' + formatGold(cost) + ' 金币', 'error');
    return;
  }
  gameState.coins -= cost;
  gameState.spawnLevel++;
  // 清理低于新招募等级的小球
  const before = gameState.balls.length;
  const remaining = gameState.balls.filter(b => b.level >= gameState.spawnLevel);
  const cleaned = gameState.balls.filter(b => b.level < gameState.spawnLevel);
  const sl = gameState.spawnLevel;
  const spawnCost = (remaining.length + 1) * 4 * sl * sl;
  // 金币不足购买一个球时，保留至少3个最高等级的清理球
  if (remaining.length < 3 && gameState.coins < spawnCost) {
    cleaned.sort((a, b) => b.level - a.level);
    const keepCount = Math.min(3 - remaining.length, cleaned.length);
    gameState.balls = [...remaining, ...cleaned.slice(0, keepCount)];
    const removed = before - gameState.balls.length;
    if (removed > 0) showToast('已清理 ' + removed + ' 个低等级小球（保留' + keepCount + '个）', 'info');
  } else {
    gameState.balls = remaining;
    const removed = before - gameState.balls.length;
    if (removed > 0) showToast('已清理 ' + removed + ' 个低等级小球', 'info');
  }
  showToast('招募小球升级到 Lv.' + gameState.spawnLevel + '！', 'success');
  saveGame();
  updateUI();
}

function upgradeSpawnLevelMax() {

function mergeBalls(level) {
  const sameLevel = gameState.balls.filter(b => b.level === level);
  if (sameLevel.length < 2) {
    showToast('需要2个同等级小球！', 'error');
    return;
  }
  const cost = getMergeCost(level);
  if (gameState.coins < cost) {
    showToast('金币不足！需要 ' + formatGold(cost) + ' 金币', 'error');
    return;
  }
  gameState.coins -= cost;
  const [b1, b2] = sameLevel;
  const midX = (b1.x + b2.x) / 2, midY = (b1.y + b2.y) / 2;

  gameState.balls = gameState.balls.filter(b => b !== b1 && b !== b2);
  const nl = level + 1;
  // 字母关卡中确保新球在字母内部
  const sp = (gameState.currentStage > 0 && !maskAlpha(midX, midY)) ? getValidSpawnPoint() : { x: midX, y: midY };
  gameState.balls.push({
    x: sp.x, y: sp.y,
    vx: (Math.random() - 0.5) * 5, vy: -3,
    radius: 14, level: nl,
    color: getBallColor(nl), isActive: true
  });

}

// ==================== 智能合成 ====================
function getHighestLevelWithPair() {
  const lc = {};
  gameState.balls.forEach(b => lc[b.level] = (lc[b.level] || 0) + 1);
  let highest = -1;
  for (const [lv, count] of Object.entries(lc)) {
    if (count >= 2) {
      const lvNum = Number(lv);
      if (lvNum > highest) highest = lvNum;
    }
  }
  return highest;
}

function doMerge() {
  const level = getHighestLevelWithPair();
  if (level === -1) return;
  mergeBalls(level);
}

function perturbVelocity(ball) {
  const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
  if (speed < 0.5) return;
  const angle = Math.atan2(ball.vy, ball.vx) + (Math.random() - 0.5) * 0.14;
  ball.vx = Math.cos(angle) * speed;
  ball.vy = Math.sin(angle) * speed;
}

// ==================== 批量操作 ====================
function getHighestBallLevel() {
  let maxLv = 0;
  for (const b of gameState.balls) {
    if (b.level > maxLv) maxLv = b.level;
  }
  return maxLv;
}

function spawnBatch100() {

    return;
  }
  const n = Math.min(100, MAX_BALLS - gameState.balls.length);
  // 总成本 = sum_{i=1}^{n} (currentCount + i) * 4 * spawnLevel^2
  const cur = gameState.balls.length;
  const sl = gameState.spawnLevel;
  const totalCost = 4 * sl * sl * (n * cur + n * (n + 1) / 2);
  if (gameState.coins < totalCost) {
    showToast('金币不足！需要 ' + formatGold(totalCost) + ' 金币', 'error');
    return;
  }
  gameState.coins -= totalCost;
  for (let i = 0; i < n; i++) {
    const sp = getValidSpawnPoint();
    gameState.balls.push({
      x: sp.x, y: sp.y,
      vx: (Math.random() - 0.5) * 5, vy: 1,
      radius: 14, level: sl,
      color: getBallColor(sl), isActive: true
    });
  }
  showToast('成功招募 ' + n + ' 个小球！', 'success');
  saveGame();
  updateUI();
}

    const midX = (b1.x + b2.x) / 2, midY = (b1.y + b2.y) / 2;
    gameState.coins -= cost;
    gameState.balls = gameState.balls.filter(b => b !== b1 && b !== b2);
    const nl = level + 1;
    const sp = (gameState.currentStage > 0 && !maskAlpha(midX, midY)) ? getValidSpawnPoint() : { x: midX, y: midY };
    gameState.balls.push({

function computerUpgradePads() {

function computerBuyPad() {
  const cs = gameState.computer;
  if (!cs) return;
  let nextIdx = -1;
  for (let i = 1; i < cs.bouncePads.length; i++) {
    if (!cs.bouncePads.find(p => p.id === i) || !cs.bouncePads.find(p => p.id === i).unlocked) {
      nextIdx = i; break;
    }
  }
  if (nextIdx === -1) return;
  const cost = getUnlockCost(nextIdx);
  if (cs.coins < cost) return;
  cs.coins -= cost;
  const pad = cs.bouncePads.find(p => p.id === nextIdx);
  if (pad) pad.unlocked = true;
}

function hasMergeableBalls(cs) {
  const lc = {};
  cs.balls.forEach(b => lc[b.level] = (lc[b.level] || 0) + 1);
  for (const count of Object.values(lc)) { if (count >= 2) return true; }
  return false;
}

function getSpawnUpgradeCost(lv) { return lv * lv * 100000; }
function getSpawnCostForState(state) {
  const sl = state.spawnLevel;
  return (state.balls.length + 1) * 4 * sl * sl;
}
function getPadCostForState(state) {
  for (let i = 1; i < state.bouncePads.length; i++) {
    const pad = state.bouncePads.find(p => p.id === i);
    if (!pad || !pad.unlocked) return getUnlockCost(i);
  }
  return Infinity;
}
function hasLockedPads(state) {
  for (let i = 1; i < state.bouncePads.length; i++) {
    const pad = state.bouncePads.find(p => p.id === i);
    if (pad && !pad.unlocked) return true;
  }
  return false;
}
function canUpgradePads(state) {
  return state.bouncePads.every(p => p.unlocked) && state.bouncePadLevel < 10000;
}

    const sameLevel = cs.balls.filter(b => b.level === highest);

    const [b1, b2] = sameLevel;
    const midX = (b1.x + b2.x) / 2, midY = (b1.y + b2.y) / 2;
    cs.coins -= cost;
    cs.balls = cs.balls.filter(b => b !== b1 && b !== b2);
    const nl = highest + 1;
    const sp = halfMaskAlpha(Math.floor(midX - HALF_W), Math.floor(midY), computerMaskImageData) ? { x: midX, y: midY } : computerGetValidSpawnPoint();
    cs.balls.push({

}

// ==================== 电脑AI主循环 ====================
let computerAIInterval = null;

function startComputerAI() {
  if (computerAIInterval) clearInterval(computerAIInterval);
  computerAIInterval = setInterval(computerAI, 1500);
}

function stopComputerAI() {
  if (computerAIInterval) { clearInterval(computerAIInterval); computerAIInterval = null; }
}

function computerAI() {
  const cs = gameState.computer;
  if (!cs || gameState.challengeWinner) return;

  const diff = gameState.difficulty || 0;
  const padCost = getPadCostForState(cs);
  const spawnC = getSpawnCostForState(cs);
  const upgCost = canUpgradePads(cs) ? getUpgradeCost(cs.bouncePadLevel) : Infinity;
  const spawnUpCost = getSpawnUpgradeCost(cs.spawnLevel);
  const canRecruit = cs.balls.length < MAX_BALLS;
  const canBuyPad = hasLockedPads(cs);
  const canUpgPad = canUpgradePads(cs) && cs.coins >= upgCost;
  const canMerge = hasMergeableBalls(cs);
  let mergeCost = Infinity, batchCost = Infinity;
  if (canMerge) {
    const lc = {};
    cs.balls.forEach(b => lc[b.level] = (lc[b.level] || 0) + 1);
    let hp = -1;
    for (const [lv, cnt] of Object.entries(lc)) {
      if (cnt >= 2) { const n = Number(lv); if (n > hp) hp = n; }
    }
    if (hp >= 0) mergeCost = getMergeCost(hp);
  }
  if (canRecruit) {
    const n = Math.min(100, MAX_BALLS - cs.balls.length);
    batchCost = n * n * 4 * cs.spawnLevel * cs.spawnLevel;
  }

  // 10种操作定义：id, cost(排序用), available, fn
  const defs = [
    { id: 1, cost: spawnUpCost, available: cs.coins >= spawnUpCost, fn: computerUpgradeSpawn },
    { id: 2, cost: spawnC, available: canRecruit && cs.coins >= spawnC, fn: computerSpawnBall },
    { id: 3, cost: padCost, available: canBuyPad && cs.coins >= padCost, fn: computerBuyPad },
    { id: 4, cost: upgCost, available: canUpgPad, fn: computerUpgradePads },
    { id: 5, cost: upgCost, available: canUpgradePads(cs) && cs.coins >= upgCost, fn: () => { while (cs.coins >= getUpgradeCost(cs.bouncePadLevel) && cs.bouncePadLevel < 10000) { cs.coins -= getUpgradeCost(cs.bouncePadLevel); cs.bouncePadLevel++; } } },
    { id: 6, cost: mergeCost, available: canMerge && cs.coins >= mergeCost, fn: computerMergeBalls },
    { id: 7, cost: batchCost, available: canRecruit && cs.coins >= batchCost, fn: computerSpawnBatch100 },
    { id: 8, cost: mergeCost, available: canMerge && cs.coins >= mergeCost, fn: computerMergeAll },
    { id: 9, cost: upgCost, available: canUpgPad, fn: computerUpgradePads },
    { id: 10, cost: mergeCost, available: canMerge && cs.coins >= mergeCost, fn: computerMergeBalls },
  ];
  const actMap = {};
  defs.forEach(d => actMap[d.id] = d);

  // 自定义模式(diff=4)：优先用自定义策略，否则全部10种轮流
  if (diff === 4) {
    const custom = gameState.customStrategy;
    if (custom && custom.length === 3) {
      // 使用自定义三级优先级
      for (const tier of custom) {
        if (!tier.length) continue;
        const avail = tier.map(id => actMap[id]).filter(a => a && a.available);
        avail.sort((a, b) => a.cost - b.cost);
        for (const a of avail) { a.fn(); return; }
      }
    }
    // 默认：全部10种轮流
    if (!cs._aiCursor) cs._aiCursor = 0;
    for (let i = 0; i < 10; i++) {
      const idx = (cs._aiCursor + i) % 10;
      if (defs[idx].available) { defs[idx].fn(); cs._aiCursor = (idx + 1) % 10; return; }
    }
    cs._aiCursor = (cs._aiCursor + 1) % 10;
    return;
  }

  // 固定难度策略：每组内成本低的优先
  const strategy = {
    0: [[2,3], [4,1], [5,6]],           // 普通
    1: [[3,2], [1,4], [5,6]],           // 困难
    2: [[3,2], [1,4], [5,6]],           // 地狱
    3: [[1,2], [3,4], [5,6]],           // 自虐
  };
  const tiers = strategy[diff] || strategy[0];

  for (const tier of tiers) {
    const avail = tier.map(id => actMap[id]).filter(a => a.available);
    avail.sort((a, b) => a.cost - b.cost);
    for (const a of avail) {
      a.fn();
      return;
    }
  }
}

// ==================== 曲线碰撞检测 [基础关] ====================
function segmentToBall(sx, sy, ex, ey, bx, by, r) {
  const dx = ex - sx, dy = ey - sy;
  const fx = sx - bx, fy = sy - by;
  const a = dx * dx + dy * dy;
  const b = 2 * (fx * dx + fy * dy);
  const c = fx * fx + fy * fy - r * r;
  let t = a > 0.001 ? Math.max(0, Math.min(1, -b / (2 * a))) : 0;
  const cx = sx + t * dx, cy = sy + t * dy;
  const dist = Math.sqrt((cx - bx) ** 2 + (cy - by) ** 2);
  return { hit: dist <= r, cx, cy, t, dist };
}

function getPadForT(t) {
  for (const pad of gameState.bouncePads) {
    if (pad.type !== 'curve') continue;
    if (t >= pad.tStart && t <= pad.tEnd) return pad;
  }
  return null;
}

function resolveCurveCollision(ball) {
  let rewarded = false;
  for (let pass = 0; pass < 4; pass++) {
    let hit = false;
    for (let i = 0; i < CURVE_SAMPLES; i++) {
      const seg = curveSegments[i];
      const result = segmentToBall(seg.x1, seg.y1, seg.x2, seg.y2, ball.x, ball.y, ball.radius);
      if (result.hit) {
        hit = true;
        const pen = ball.radius - result.dist + 1.0;
        ball.x += seg.nx * pen;
        ball.y += seg.ny * pen;
        const dot = ball.vx * seg.nx + ball.vy * seg.ny;
        if (dot < 0) {
          ball.vx = (ball.vx - 2 * dot * seg.nx) * BOUNCE_DAMPING;
          ball.vy = (ball.vy - 2 * dot * seg.ny) * BOUNCE_DAMPING;
          perturbVelocity(ball);
        }
        if (!rewarded) {
          rewarded = true;
          const segT = (i + result.t) / CURVE_SAMPLES;
          const pad = getPadForT(segT);
          if (pad && pad.unlocked) {
            const reward = getWallCoinReward(ball.level) * gameState.bouncePadLevel * getCoinMultiplier();
            addCoins(reward);
            spawnParticles(result.cx, result.cy, getPadColor(gameState.bouncePadLevel), 5);
          }
        }
        break;
      }
    }
    if (!hit) break;
  }
}

// ==================== 直墙碰撞 [基础关] ====================
function checkWallCollision(ball) {
  if (ball.y <= WALL_BOT_Y && ball.x - ball.radius <= LEFT_X) {
    ball.x = LEFT_X + ball.radius;
    ball.vx = Math.abs(ball.vx) * BOUNCE_DAMPING;
    perturbVelocity(ball);
    if (!ball._wallRewarded) {
      for (const pad of gameState.bouncePads) {
        if (pad.type === 'wall' && pad.side === 'left' && pad.unlocked &&
            ball.y >= pad.yStart && ball.y <= pad.yEnd) {
          ball._wallRewarded = true;
          const reward = getWallCoinReward(ball.level) * gameState.bouncePadLevel * getCoinMultiplier();
          addCoins(reward);
          spawnParticles(LEFT_X, ball.y, getPadColor(gameState.bouncePadLevel), 5);
          break;
        }
      }
    }
  }
  if (ball.y <= WALL_BOT_Y && ball.x + ball.radius >= RIGHT_X) {
    ball.x = RIGHT_X - ball.radius;
    ball.vx = -Math.abs(ball.vx) * BOUNCE_DAMPING;
    perturbVelocity(ball);
    for (const pad of gameState.bouncePads) {
      if (pad.type === 'wall' && pad.side === 'right' && pad.unlocked &&
          ball.y >= pad.yStart && ball.y <= pad.yEnd) {
        if (!ball._wallRewarded) {
          ball._wallRewarded = true;
          const reward = getWallCoinReward(ball.level) * gameState.bouncePadLevel * getCoinMultiplier();
          addCoins(reward);
          spawnParticles(RIGHT_X, ball.y, getPadColor(gameState.bouncePadLevel), 5);
        }
        break;
      }
    }
  }
}

function checkTopBoundary(ball) {
  if (ball.y - ball.radius >= WALL_TOP_Y) return;
  if (ball.x < LEFT_X) {
    ball.x = LEFT_X + ball.radius;
    ball.vx = Math.abs(ball.vx) * BOUNCE_DAMPING;
  } else if (ball.x > RIGHT_X) {
    ball.x = RIGHT_X - ball.radius;
    ball.vx = -Math.abs(ball.vx) * BOUNCE_DAMPING;
  }
  ball.y = WALL_TOP_Y + ball.radius;
  ball.vy = Math.abs(ball.vy) * BOUNCE_DAMPING;
  perturbVelocity(ball);
}

function checkBelowCurve(ball) {
  if (ball.y + ball.radius < WALL_BOT_Y) return;
  if (ball.x < LEFT_X) {
    ball.x = LEFT_X + ball.radius;
    ball.vx = Math.abs(ball.vx) * BOUNCE_DAMPING;
    if (ball.y > WALL_BOT_Y) {
      ball.y = WALL_BOT_Y - ball.radius;
      ball.vy = -Math.abs(ball.vy) * BOUNCE_DAMPING;
    }
    return;
  }
  if (ball.x > RIGHT_X) {
    ball.x = RIGHT_X - ball.radius;
    ball.vx = -Math.abs(ball.vx) * BOUNCE_DAMPING;
    if (ball.y > WALL_BOT_Y) {
      ball.y = WALL_BOT_Y - ball.radius;
      ball.vy = -Math.abs(ball.vy) * BOUNCE_DAMPING;
    }
    return;
  }
  const curveY = getCurveYForX(ball.x);
  if (ball.y > curveY) {
    ball.y = curveY - ball.radius;
    ball.vy = -Math.abs(ball.vy) * BOUNCE_DAMPING;
  }
}

function checkOutOfBounds(ball) {
  if (ball.x < LEFT_X - 50 || ball.x > RIGHT_X + 50 || ball.y < -30) {
    ball.x = 370 + Math.random() * 60;
    ball.y = WALL_TOP_Y + 25;
    ball.vx = (Math.random() - 0.5) * 4;
    ball.vy = 2;
  }
}

// ==================== 物理更新 ====================
function updatePhysics() {
  if (gameState.mode === 'challenge' && gameState.computer) {
    updateChallengePhysics();
    return;
  }
  // 个人模式物理（不变）
  for (const ball of gameState.balls) {
    if (!ball.isActive) continue;
    ball.vy += GRAVITY;
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball._wallRewarded = false;
    ball._letterRewarded = false;

    if (gameState.currentStage === 0) {
      // 基础关：U型墙面碰撞
      resolveCurveCollision(ball);
      checkWallCollision(ball);
      checkTopBoundary(ball);
      checkBelowCurve(ball);
      checkOutOfBounds(ball);
    } else {
      // 字母关卡：像素碰撞
      resolveLetterCollision(ball);
    }
  }

  // 小球间碰撞
  const balls = gameState.balls;
  for (let i = 0; i < balls.length; i++) {
    const a = balls[i];
    if (!a.isActive) continue;
    for (let j = i + 1; j < balls.length; j++) {
      const b = balls[j];
      if (!b.isActive) continue;
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minDist = a.radius + b.radius;
      if (dist < minDist && dist > 0.001) {
        const overlap = minDist - dist;
        const nx = dx / dist;
        const ny = dy / dist;
        a.x -= nx * overlap / 2;
        a.y -= ny * overlap / 2;
        b.x += nx * overlap / 2;
        b.y += ny * overlap / 2;
        const dvx = a.vx - b.vx;
        const dvy = a.vy - b.vy;
        const dvDotN = dvx * nx + dvy * ny;
        if (dvDotN > 0) {
          a.vx -= dvDotN * nx;
          a.vy -= dvDotN * ny;
          b.vx += dvDotN * nx;
          b.vy += dvDotN * ny;
        }
      }
    }
  }

  updateParticles();
}

// 挑战模式：分别更新玩家和电脑物理
function updateChallengePhysics() {
  const cs = gameState.computer;
  if (!cs) return;

  // ========== 玩家物理（左半区 0-400）==========
  for (const ball of gameState.balls) {
    if (!ball.isActive) continue;
    ball.vy += GRAVITY;
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball._letterRewarded = false;

    // 玩家球边界约束：限制在左半区0-400
    if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.vx = Math.abs(ball.vx) * BOUNCE_DAMPING; }
    if (ball.x + ball.radius > HALF_W - 2) { ball.x = HALF_W - 2 - ball.radius; ball.vx = -Math.abs(ball.vx) * BOUNCE_DAMPING; }
    if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.vy = Math.abs(ball.vy) * BOUNCE_DAMPING; }
    if (ball.y + ball.radius > CANVAS_H) { ball.y = CANVAS_H - ball.radius; ball.vy = -Math.abs(ball.vy) * BOUNCE_DAMPING; }

    resolveHalfLetterCollision(ball, gameState.bouncePads, gameState.bouncePadLevel, gameState, true);
  }

  // 玩家球间碰撞
  const pBalls = gameState.balls;
  for (let i = 0; i < pBalls.length; i++) {
    const a = pBalls[i];
    if (!a.isActive) continue;
    for (let j = i + 1; j < pBalls.length; j++) {
      const b = pBalls[j];
      if (!b.isActive) continue;
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minDist = a.radius + b.radius;
      if (dist < minDist && dist > 0.001) {
        const overlap = minDist - dist;
        const nx = dx / dist;
        const ny = dy / dist;
        a.x -= nx * overlap / 2; a.y -= ny * overlap / 2;
        b.x += nx * overlap / 2; b.y += ny * overlap / 2;
        const dvx = a.vx - b.vx;
        const dvy = a.vy - b.vy;
        const dvDotN = dvx * nx + dvy * ny;
        if (dvDotN > 0) {
          a.vx -= dvDotN * nx; a.vy -= dvDotN * ny;
          b.vx += dvDotN * nx; b.vy += dvDotN * ny;
        }
      }
    }
  }

  // ========== 电脑物理（右半区 400-800）==========
  for (const ball of cs.balls) {
    if (!ball.isActive) continue;
    ball.vy += GRAVITY;
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball._letterRewarded = false;

    // 电脑球边界约束：限制在右半区400-800
    if (ball.x - ball.radius < HALF_W + 2) { ball.x = HALF_W + 2 + ball.radius; ball.vx = Math.abs(ball.vx) * BOUNCE_DAMPING; }
    if (ball.x + ball.radius > CANVAS_W) { ball.x = CANVAS_W - ball.radius; ball.vx = -Math.abs(ball.vx) * BOUNCE_DAMPING; }
    if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.vy = Math.abs(ball.vy) * BOUNCE_DAMPING; }
    if (ball.y + ball.radius > CANVAS_H) { ball.y = CANVAS_H - ball.radius; ball.vy = -Math.abs(ball.vy) * BOUNCE_DAMPING; }

    resolveHalfLetterCollision(ball, cs.bouncePads, cs.bouncePadLevel, cs, false);
  }

  // 电脑球间碰撞
  const cBalls = cs.balls;
  for (let i = 0; i < cBalls.length; i++) {
    const a = cBalls[i];
    if (!a.isActive) continue;
    for (let j = i + 1; j < cBalls.length; j++) {
      const b = cBalls[j];
      if (!b.isActive) continue;
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minDist = a.radius + b.radius;
      if (dist < minDist && dist > 0.001) {
        const overlap = minDist - dist;
        const nx = dx / dist;
        const ny = dy / dist;
        a.x -= nx * overlap / 2; a.y -= ny * overlap / 2;
        b.x += nx * overlap / 2; b.y += ny * overlap / 2;
        const dvx = a.vx - b.vx;
        const dvy = a.vy - b.vy;
        const dvDotN = dvx * nx + dvy * ny;
        if (dvDotN > 0) {
          a.vx -= dvDotN * nx; a.vy -= dvDotN * ny;
          b.vx += dvDotN * nx; b.vy += dvDotN * ny;
        }
      }
    }
  }

  updateParticles();
  updateComputerParticles();
}

// ==================== 渲染 ====================
function render() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // 背景网格
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < CANVAS_W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CANVAS_H); ctx.stroke();
  }
  for (let y = 0; y < CANVAS_H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CANVAS_W, y); ctx.stroke();
  }

  if (gameState.mode === 'challenge' && gameState.computer) {
    renderChallenge();
    return;
  }

  if (gameState.currentStage === 0) {
    // ===== 基础关渲染：U型墙面 =====
    for (const pad of gameState.bouncePads) {
      if (pad.type !== 'curve') continue;
      const color = pad.unlocked ? getPadColor(gameState.bouncePadLevel) : '#333';
      const si = Math.floor(pad.tStart * CURVE_SAMPLES);
      const ei = Math.ceil(pad.tEnd * CURVE_SAMPLES);
      for (let i = si; i < ei && i < CURVE_SAMPLES; i++) {
        const seg = curveSegments[i];
        let s = i === si ? pad.tStart * CURVE_SAMPLES - si : 0;
        let e = i === ei - 1 ? pad.tEnd * CURVE_SAMPLES - i : 1;
        s = Math.max(0, Math.min(1, s));
        e = Math.max(0, Math.min(1, e));
        const sx = seg.x1 + (seg.x2 - seg.x1) * s;
        const sy = seg.y1 + (seg.y2 - seg.y1) * s;
        const ex = seg.x1 + (seg.x2 - seg.x1) * e;
        const ey = seg.y1 + (seg.y2 - seg.y1) * e;
        ctx.strokeStyle = color;
        ctx.lineWidth = pad.unlocked ? 11 : 5;
        ctx.lineCap = 'butt';
        ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
        if (pad.unlocked) {
          ctx.strokeStyle = color;
          ctx.globalAlpha = 0.22;
          ctx.lineWidth = 20;
          ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }
    }
    // 两侧墙面弹跳板
    for (const pad of gameState.bouncePads) {
      if (pad.type !== 'wall') continue;
      const color = pad.unlocked ? getPadColor(gameState.bouncePadLevel) : '#333';
      const x = pad.side === 'left' ? LEFT_X : RIGHT_X;
      ctx.strokeStyle = color;
      ctx.lineWidth = pad.unlocked ? 11 : 5;
      ctx.lineCap = 'butt';
      ctx.beginPath();
      ctx.moveTo(x, pad.yStart);
      ctx.lineTo(x, pad.yEnd);
      ctx.stroke();
      if (pad.unlocked) {
        ctx.strokeStyle = color;
        ctx.globalAlpha = 0.22;
        ctx.lineWidth = 20;
        ctx.beginPath();
        ctx.moveTo(x, pad.yStart);
        ctx.lineTo(x, pad.yEnd);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }
    // U型墙面
    ctx.strokeStyle = '#cccccc';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(LEFT_X, WALL_TOP_Y);
    ctx.lineTo(LEFT_X, WALL_BOT_Y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(RIGHT_X, WALL_TOP_Y);
    ctx.lineTo(RIGHT_X, WALL_BOT_Y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(BEZIER_P0.x, BEZIER_P0.y);
    ctx.quadraticCurveTo(BEZIER_P1.x, BEZIER_P1.y, BEZIER_P2.x, BEZIER_P2.y);
    ctx.stroke();
  } else {
    // ===== 字母关卡渲染：字母轮廓 =====
    const letter = getStageName(gameState.currentStage);
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.font = LETTER_FONT_VISUAL;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(letter, CANVAS_W / 2, CANVAS_H / 2 + 10);

    ctx.save();
    ctx.shadowColor = 'rgba(100,180,255,0.5)';
    ctx.shadowBlur = 16;
    ctx.strokeStyle = 'rgba(100,180,255,0.6)';
    ctx.lineWidth = 4;
    ctx.strokeText(letter, CANVAS_W / 2, CANVAS_H / 2 + 10);
    ctx.restore();

    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.strokeText(letter, CANVAS_W / 2, CANVAS_H / 2 + 10);

    for (const pad of gameState.bouncePads) {
      if (pad.type !== 'letter') continue;
      const color = pad.unlocked ? getPadColor(gameState.bouncePadLevel) : '#333';
      ctx.fillStyle = pad.unlocked ? color : '#333';
      ctx.globalAlpha = pad.unlocked ? 0.35 : 0.5;
      ctx.beginPath(); ctx.arc(pad.x, pad.y, 12, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(pad.x, pad.y, 5, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(pad.x, pad.y, 5, 0, Math.PI * 2); ctx.stroke();
    }
  }

  renderParticles();

  // 小球
  for (const ball of gameState.balls) {
    ctx.shadowColor = ball.color;
    ctx.shadowBlur = 10;
    const grad = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 2, ball.x, ball.y, ball.radius);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.4, ball.color);
    grad.addColorStop(1, '#000000');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px "Microsoft YaHei", Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Lv.' + ball.level, ball.x, ball.y);
  }

  // 左上角状态面板
  let highestLv = 0;
  for (const b of gameState.balls) {
    if (b.level > highestLv) highestLv = b.level;
  }

  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  roundRect(12, 8, 198, 120, 6);

  ctx.fillStyle = '#ff9900';
  ctx.font = 'bold 14px "Microsoft YaHei", Arial';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(getStageFullName(gameState.currentStage), 22, 16);

  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 14px "Microsoft YaHei", Arial';
  ctx.fillText('金币: ' + formatGold(gameState.coins), 22, 38);

  ctx.fillStyle = '#aaa';
  ctx.font = '12px "Microsoft YaHei", Arial';
  ctx.fillText('小球: ' + gameState.balls.length + '/' + MAX_BALLS, 22, 58);

  ctx.fillStyle = '#ff8800';
  ctx.font = 'bold 12px "Microsoft YaHei", Arial';
  ctx.fillText('最高: Lv.' + highestLv, 22, 78);

  ctx.fillStyle = '#ffaa44';
  ctx.font = '10px "Microsoft YaHei", Arial';
  ctx.fillText('(所得金币×' + getCoinMultiplier().toFixed(2) + ')', 22, 94);

  ctx.fillStyle = '#66ccff';
  ctx.font = '11px "Microsoft YaHei", Arial';
  const nextName = gameState.currentStage >= 26 ? '→ 100级循环回第0关' : ('→ 100级进入' + getStageFullName(gameState.currentStage + 1));
  ctx.fillText(nextName, 22, 112);
}

// 挑战模式渲染
function renderChallenge() {
  const cs = gameState.computer;
  const letter = getStageName(gameState.currentStage);

  // ===== 左半区：玩家字母 =====
  ctx.save();
  ctx.beginPath(); ctx.rect(0, 0, HALF_W, CANVAS_H); ctx.clip();

  // 字母半透明填充
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.font = LETTER_FONT_VISUAL;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(letter, HALF_W / 2, CANVAS_H / 2 + 10);

  // 字母发光轮廓
  ctx.save();
  ctx.shadowColor = 'rgba(100,180,255,0.5)';
  ctx.shadowBlur = 16;
  ctx.strokeStyle = 'rgba(100,180,255,0.6)';
  ctx.lineWidth = 4;
  ctx.strokeText(letter, HALF_W / 2, CANVAS_H / 2 + 10);
  ctx.restore();

  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.strokeText(letter, HALF_W / 2, CANVAS_H / 2 + 10);

  // 玩家弹跳板
  for (const pad of gameState.bouncePads) {
    if (pad.type !== 'letter') continue;
    const color = pad.unlocked ? getPadColor(gameState.bouncePadLevel) : '#333';
    ctx.fillStyle = pad.unlocked ? color : '#333';
    ctx.globalAlpha = pad.unlocked ? 0.35 : 0.5;
    ctx.beginPath(); ctx.arc(pad.x, pad.y, 12, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(pad.x, pad.y, 5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(pad.x, pad.y, 5, 0, Math.PI * 2); ctx.stroke();
  }

  // 玩家粒子
  for (const p of gameState.particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // 玩家小球
  for (const ball of gameState.balls) {
    ctx.shadowColor = ball.color;
    ctx.shadowBlur = 10;
    const grad = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 2, ball.x, ball.y, ball.radius);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.4, ball.color);
    grad.addColorStop(1, '#000000');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px "Microsoft YaHei", Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Lv.' + ball.level, ball.x, ball.y);
  }
  ctx.restore();

  // ===== 右半区：电脑字母 =====
  ctx.save();
  ctx.beginPath(); ctx.rect(HALF_W, 0, HALF_W, CANVAS_H); ctx.clip();

  ctx.fillStyle = 'rgba(255,100,100,0.05)';
  ctx.font = LETTER_FONT_VISUAL;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(letter, HALF_W + HALF_W / 2, CANVAS_H / 2 + 10);

  ctx.save();
  ctx.shadowColor = 'rgba(255,100,100,0.5)';
  ctx.shadowBlur = 16;
  ctx.strokeStyle = 'rgba(255,100,100,0.6)';
  ctx.lineWidth = 4;
  ctx.strokeText(letter, HALF_W + HALF_W / 2, CANVAS_H / 2 + 10);
  ctx.restore();

  ctx.strokeStyle = 'rgba(255,200,200,0.3)';
  ctx.lineWidth = 2;
  ctx.strokeText(letter, HALF_W + HALF_W / 2, CANVAS_H / 2 + 10);

  // 电脑弹跳板
  for (const pad of cs.bouncePads) {
    if (pad.type !== 'letter') continue;
    const color = pad.unlocked ? getPadColor(cs.bouncePadLevel) : '#333';
    ctx.fillStyle = pad.unlocked ? color : '#333';
    ctx.globalAlpha = pad.unlocked ? 0.35 : 0.5;
    ctx.beginPath(); ctx.arc(pad.x, pad.y, 12, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(pad.x, pad.y, 5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(pad.x, pad.y, 5, 0, Math.PI * 2); ctx.stroke();
  }

  // 电脑粒子
  for (const p of cs.particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // 电脑小球
  for (const ball of cs.balls) {
    ctx.shadowColor = ball.color;
    ctx.shadowBlur = 10;
    const grad = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 2, ball.x, ball.y, ball.radius);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.4, ball.color);
    grad.addColorStop(1, '#000000');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px "Microsoft YaHei", Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Lv.' + ball.level, ball.x, ball.y);
  }
  ctx.restore();

  // ===== 中间分割线 =====
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 8]);
  ctx.beginPath(); ctx.moveTo(HALF_W, 0); ctx.lineTo(HALF_W, CANVAS_H); ctx.stroke();
  ctx.setLineDash([]);

  // ===== 左上角：玩家面板 =====
  let pHighest = 0;
  for (const b of gameState.balls) { if (b.level > pHighest) pHighest = b.level; }

  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  roundRect(12, 8, 198, 132, 6);

  ctx.fillStyle = '#3399ff';
  ctx.font = 'bold 13px "Microsoft YaHei", Arial';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('玩家 第' + gameState.currentStage + '关 ' + letter, 22, 10);

  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 13px "Microsoft YaHei", Arial';
  ctx.fillText('金币: ' + formatGold(gameState.coins), 22, 30);

  ctx.fillStyle = '#aaa';
  ctx.font = '11px "Microsoft YaHei", Arial';
  ctx.fillText('小球: ' + gameState.balls.length + '/' + MAX_BALLS, 22, 48);

  ctx.fillStyle = '#ff8800';
  ctx.font = 'bold 11px "Microsoft YaHei", Arial';
  ctx.fillText('最高: Lv.' + pHighest, 22, 64);

  ctx.fillStyle = '#ffaa44';
  ctx.font = '10px "Microsoft YaHei", Arial';
  ctx.fillText('(所得×' + (getCoinMultiplier() * gameState.playerCoinMult).toFixed(2) + ')', 22, 78);

  ctx.fillStyle = '#66ccff';
  ctx.font = '10px "Microsoft YaHei", Arial';
  ctx.fillText('弹跳板: Lv.' + gameState.bouncePadLevel, 22, 94);

  ctx.fillStyle = '#9966ff';
  ctx.font = '9px "Microsoft YaHei", Arial';
  ctx.fillText('金币比: 玩家' + (gameState.playerCoinMult * 100).toFixed(0) + '% / 电脑' + (gameState.computerCoinMult * 100).toFixed(0) + '%', 22, 112);

  // ===== 右上角：电脑面板 =====
  let cHighest = 0;
  for (const b of cs.balls) { if (b.level > cHighest) cHighest = b.level; }

  const panelW = 195;
  const panelX = CANVAS_W - panelW - 12;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  roundRect(panelX, 8, panelW, 118, 6);

  ctx.fillStyle = '#ff6633';
  ctx.font = 'bold 13px "Microsoft YaHei", Arial';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('电脑 第' + gameState.currentStage + '关 ' + letter, panelX + 10, 10);

  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 13px "Microsoft YaHei", Arial';
