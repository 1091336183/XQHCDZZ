  ctx.fillStyle = '#aaa';
  ctx.font = '11px "Microsoft YaHei", Arial';
  ctx.fillText('小球: ' + cs.balls.length + '/' + MAX_BALLS, panelX + 10, 48);

  ctx.fillStyle = '#ff8800';
  ctx.font = 'bold 11px "Microsoft YaHei", Arial';
  ctx.fillText('最高: Lv.' + cHighest, panelX + 10, 64);

  ctx.fillStyle = '#ffaa44';
  ctx.font = '10px "Microsoft YaHei", Arial';
  ctx.fillText('(所得金币×' + gameState.computerCoinMult.toFixed(2) + ')', panelX + 10, 78);

  ctx.fillStyle = '#66ccff';
  ctx.font = '10px "Microsoft YaHei", Arial';
  ctx.fillText('弹跳板: Lv.' + cs.bouncePadLevel, panelX + 10, 94);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}

// ==================== UI ====================
function updateUI() {
  const spawnBtn = document.getElementById('btn-spawn');
  const sl = gameState.spawnLevel;
  const spawnCost = (gameState.balls.length + 1) * 4 * sl * sl;
  spawnBtn.textContent = '招募小球(' + formatGold(spawnCost) + '金)';
  spawnBtn.disabled = gameState.balls.length >= MAX_BALLS;

  // 招募小球升级按钮
  const upgBtn = document.getElementById('btn-spawn-upgrade');
  if (upgBtn) {
    const ul = gameState.spawnLevel;
    const upCost = ul * ul * 100000;
    const canUp = gameState.coins >= upCost;
    upgBtn.textContent = '招募升级(Lv.' + ul + '→' + (ul + 1) + ' ' + formatGold(upCost) + '金)';
    upgBtn.disabled = !canUp;
    upgBtn.className = canUp ? 'btn-spawn-upgrade ready' : 'btn-spawn-upgrade';
  }

  const maxUpgBtn = document.getElementById('btn-spawn-max-upgrade');
  if (maxUpgBtn) {
    const ul = gameState.spawnLevel;
    const upCost = ul * ul * 100000;
    const canUp = gameState.coins >= upCost;
    maxUpgBtn.disabled = !canUp;
    maxUpgBtn.className = canUp ? 'btn-spawn-max-upgrade ready' : 'btn-spawn-max-upgrade';
  }

  const mergeBtn = document.getElementById('btn-merge');
  if (mergeBtn) {
    const bestLv = getHighestLevelWithPair();
    if (bestLv >= 0) {
      const cost = getMergeCost(bestLv);
      const canAfford = gameState.coins >= cost;
      mergeBtn.textContent = '合成 Lv.' + bestLv + '→' + (bestLv + 1) + ' (' + formatGold(cost) + '金)';
      mergeBtn.disabled = !canAfford;
      mergeBtn.className = canAfford ? 'btn-merge-main ready' : 'btn-merge-main';
    } else {
      mergeBtn.textContent = '合成(需2个同等级)';
      mergeBtn.disabled = true;
      mergeBtn.className = 'btn-merge-main';
    }
  }

  // 招募100小球按钮（最高Lv.20解锁）
  const batchBtn = document.getElementById('btn-spawn-batch');
  const highestLv = getHighestBallLevel();
  if (highestLv >= 20) {
    const n = Math.min(100, MAX_BALLS - gameState.balls.length);
    const cur = gameState.balls.length;
    const tc = 4 * sl * sl * (n * cur + n * (n + 1) / 2);
    batchBtn.textContent = '招募' + n + '小球(' + formatGold(tc) + '金)';
    batchBtn.disabled = n <= 0 || gameState.coins < tc;
    batchBtn.className = 'btn-spawn-batch unlocked';
  } else {
    batchBtn.textContent = '招募100小球(最高Lv.20解锁)';
    batchBtn.disabled = true;
    batchBtn.className = 'btn-spawn-batch locked';
  }

  // 一键合成按钮（最高Lv.40解锁）
  const mergeAllBtn = document.getElementById('btn-merge-all');
  if (highestLv >= 40) {
    let availMerges = 0;
    let testCoins = gameState.coins;
    const testBalls = [...gameState.balls.map(b => ({ ...b }))];
    // 快速估算可合成次数
    const lc = {};
    testBalls.forEach(b => lc[b.level] = (lc[b.level] || 0) + 1);
    const levels = Object.keys(lc).map(Number).sort((a, b) => b - a);
    for (const lv of levels) {
      while (lc[lv] >= 2) {
        const mc = getMergeCost(lv);
        if (testCoins < mc) break;
        testCoins -= mc;
        lc[lv] -= 2;
        lc[lv + 1] = (lc[lv + 1] || 0) + 1;
        availMerges++;
      }
    }
    if (availMerges > 0) {
      mergeAllBtn.textContent = '一键合成(' + availMerges + '次)';
      mergeAllBtn.disabled = false;
      mergeAllBtn.className = 'btn-merge-all unlocked';
    } else {
      mergeAllBtn.textContent = '一键合成(无可合成)';
      mergeAllBtn.disabled = true;
      mergeAllBtn.className = 'btn-merge-all';
    }
  } else {
    mergeAllBtn.textContent = '一键合成(最高Lv.40解锁)';
    mergeAllBtn.disabled = true;
    mergeAllBtn.className = 'btn-merge-all locked';
  }

  const buyBtn = document.getElementById('btn-buy-pad');
  const next = getNextPadIndex();
  if (next === -1) {
    buyBtn.style.display = 'none';
  } else {
    buyBtn.style.display = '';
    const c = getUnlockCost(next);
    buyBtn.textContent = '购买弹跳板(' + formatGold(c) + '金)';
    buyBtn.disabled = false;
    buyBtn.className = gameState.coins >= c ? 'btn-buy-pad ready' : 'btn-buy-pad';
  }

  const ub = document.getElementById('btn-upgrade');
  const al = gameState.bouncePads.every(p => p.unlocked);
  const uc = getUpgradeCost(gameState.bouncePadLevel);
  const bl = gameState.bouncePadLevel;
  if (!al) { ub.textContent = '升级弹跳板(需解锁9个)'; ub.disabled = true; }
  else if (bl >= 10000) { ub.textContent = '弹跳板已满级'; ub.disabled = true; }
  else { ub.textContent = '升级弹跳板(Lv.' + bl + '→' + (bl + 1) + ' ' + formatGold(uc) + '金)'; ub.disabled = gameState.coins < uc; }

  const uba = document.getElementById('btn-upgrade-all');
  if (uba) {
    if (!al) { uba.textContent = '一键升级'; uba.disabled = true; uba.className = 'btn-upgrade-all'; }
    else if (bl >= 10000) { uba.textContent = '已满级'; uba.disabled = true; uba.className = 'btn-upgrade-all'; }
    else {
      uba.disabled = gameState.coins < uc;
      uba.className = gameState.coins >= uc ? 'btn-upgrade-all ready' : 'btn-upgrade-all';
    }
  }
}

// ==================== 主循环 ====================
// 定时自动保存（每10秒）+ 页面关闭时保存
let saveTimer = 0;
function gameLoop() {
  if (!gameState.running) return;
  updatePhysics();

  if (gameState.mode === 'challenge' && gameState.computer) {
    // 挑战模式：检测胜利条件
    if (!gameState.challengeWinner) {
      for (const ball of gameState.balls) {
        if (ball.level >= 100) { gameState.challengeWinner = 'player'; break; }
      }
      if (!gameState.challengeWinner) {
        for (const ball of gameState.computer.balls) {
          if (ball.level >= 100) { gameState.challengeWinner = 'computer'; break; }
        }
      }
      if (gameState.challengeWinner) {
          stopComputerAI();
          gameState.running = false;
          const titleEl = document.getElementById('victory-title');
          const descEl = document.getElementById('victory-desc');
          if (gameState.challengeWinner === 'player') {
            titleEl.textContent = '玩家胜利！';
            titleEl.style.color = '#ffd700';
            descEl.textContent = '恭喜！你率先达到 Lv.100\n击败了电脑！';
          } else {
            titleEl.textContent = '电脑胜利！';
            titleEl.style.color = '#ff4444';
            descEl.textContent = '电脑率先达到 Lv.100\n再接再厉！';
          }
          document.getElementById('victory-dialog').classList.add('show');
        }
    }
  } else {
    // 个人模式：100级通关
    for (const ball of gameState.balls) {
      if (ball.level >= 100) {
        nextStage();
        break;
      }
    }
  }

  render();
  updateUI();

  // 每10秒自动保存
  saveTimer++;
  if (saveTimer >= 600) {
    saveTimer = 0;
    if (gameState.mode === 'personal') saveGame();
  }
  requestAnimationFrame(gameLoop);
}
window.addEventListener('beforeunload', () => {
  if (gameState.mode === 'personal') saveGame();
});

// ==================== 挑战模式初始化 ====================
function initChallengeMode(stage, diff, playerMult, computerMult, customTiers) {
  const presets = {
    0: [1.0, 1.0],      // 普通：玩家100%, 电脑100%
    1: [0.8, 2.0],      // 困难：玩家80%, 电脑200%
    2: [0.5, 10.0],     // 地狱：玩家50%, 电脑1000%
    3: [0.2, 80.0],     // 自虐：玩家20%, 电脑8000%
    4: [playerMult || 0.5, computerMult || 2.0]  // 自定义
  };
  const [pm, cm] = presets[diff] || presets[0];
  gameState.mode = 'challenge';
  gameState.difficulty = diff;
  gameState.playerCoinMult = pm;
  gameState.computerCoinMult = cm;
  gameState.currentStage = stage;
  gameState.challengeWinner = null;
  gameState.customStrategy = customTiers || null;  // 自定义策略 [[1,2],[3,4],...] 或 null

  // 电脑状态
  gameState.computer = {
    balls: [],
    bouncePads: [],
    particles: [],
    coins: 0,
    bouncePadLevel: 1,
    spawnLevel: 1,
    currentStage: stage
  };

  const letter = getStageName(stage);

  // 初始化玩家字母遮罩（左半区）
  updateHalfLetterMask(letter, true);

  // 初始化玩家弹跳板（基于半区遮罩，从0-400范围找）
  initChallengeBouncePads(true);

  // 初始化电脑字母遮罩（右半区）
  updateHalfLetterMask(letter, false);

  // 初始化电脑弹跳板（基于半区遮罩，偏移+400）
  initChallengeBouncePads(false);

  // 玩家初始球
  const pSp = getDefaultPadPositionChallenge(true);
  for (let i = 0; i < 3; i++) {
    gameState.balls.push({
      x: pSp.x + (Math.random() - 0.5) * 40,
      y: pSp.y + (Math.random() - 0.5) * 20,
      vx: (Math.random() - 0.5) * 5, vy: i === 0 ? 1 : -1,
      radius: 14, level: 1,
      color: getBallColor(1), isActive: true
    });
  }

  // 电脑初始球
  const cSp = getDefaultPadPositionChallenge(false);
  for (let i = 0; i < 3; i++) {
    gameState.computer.balls.push({
      x: cSp.x + (Math.random() - 0.5) * 40,
      y: cSp.y + (Math.random() - 0.5) * 20,
      vx: (Math.random() - 0.5) * 5, vy: i === 0 ? 1 : -1,
      radius: 14, level: 1,
      color: getBallColor(1), isActive: true
    });
  }

  // 电脑初始金币（给点起步资金）
  gameState.computer.coins = 100;
}

// 挑战模式弹跳板初始化
function initChallengeBouncePads(isPlayer) {
  const target = isPlayer ? gameState : gameState.computer;
  const imageData = isPlayer ? playerMaskImageData : computerMaskImageData;
  if (!imageData) return;

  // 在半区上找字母轮廓点
  const boundaryPoints = [];
  const step = 3;
  for (let x = 4; x < HALF_W - 4; x += step) {
    for (let y = 4; y < CANVAS_H - 4; y++) {
      if (halfMaskAlpha(x, y, imageData)) { boundaryPoints.push({ x, y, region: 'top' }); break; }
    }
    for (let y = CANVAS_H - 5; y >= 4; y--) {
      if (halfMaskAlpha(x, y, imageData)) { boundaryPoints.push({ x, y, region: 'bottom' }); break; }
    }
  }
  for (let y = 4; y < CANVAS_H - 4; y += step) {
    for (let x = 4; x < HALF_W - 4; x++) {
      if (halfMaskAlpha(x, y, imageData)) { boundaryPoints.push({ x, y, region: 'left' }); break; }
    }
    for (let x = HALF_W - 5; x >= 4; x--) {
      if (halfMaskAlpha(x, y, imageData)) { boundaryPoints.push({ x, y, region: 'right' }); break; }
    }
  }

  if (boundaryPoints.length === 0) {
    target.bouncePads = [];
    return;
  }

  let cx = 0, cy = 0;
  for (const p of boundaryPoints) { cx += p.x; cy += p.y; }
  cx /= boundaryPoints.length; cy /= boundaryPoints.length;
  boundaryPoints.sort((a, b) => Math.atan2(a.y - cy, a.x - cx) - Math.atan2(b.y - cy, b.x - cx));

  const pads = [];
  const n = 9;
  for (let i = 0; i < n; i++) {
    const idx = Math.floor((i / n) * boundaryPoints.length);
    const pt = boundaryPoints[idx];
    pads.push({ x: pt.x, y: pt.y, region: pt.region });
  }

  // 找顶部最中心点作为默认弹跳板
  let bestTop = null, bestTopDist = Infinity;
  for (const bp of boundaryPoints) {
    if (bp.region === 'top') {
      const d = Math.abs(bp.x - HALF_W / 2);
      if (d < bestTopDist) { bestTopDist = d; bestTop = bp; }
    }
  }
  if (bestTop) pads[0] = { x: bestTop.x, y: bestTop.y, region: 'top' };

  // 按y降序排列
  pads.sort((a, b) => b.y - a.y);

  // 电脑弹跳板需要x+400偏移（因为在右半区渲染）
  const xOffset = isPlayer ? 0 : HALF_W;

  target.bouncePads = pads.map((pt, i) => ({
    id: i,
    x: pt.x + xOffset,
    y: pt.y,
    unlocked: i < 5,
    type: 'letter'
  }));
}

function getDefaultPadPositionChallenge(isPlayer) {
  const state = isPlayer ? gameState : gameState.computer;
  let best = null;
  for (const p of state.bouncePads) {
    if (!best || p.y > best.y) best = p;
  }
  if (best) return { x: best.x, y: best.y - 30 };
  return { x: (isPlayer ? 200 : 600), y: CANVAS_H / 2 };
}

  Object.entries(panelDiffNames).forEach(([k, v]) => {
    h += `<button class="df2 d${k}${k === panelSelectedDiff ? ' active' : ''}" onclick="selDiff('${k}')">${v}</button>`;
  });
  g.innerHTML = h;
}
function selLetter(l) { panelSelectedLetter = l; renderPanelLetters(); }
function selDiff(d) {
  panelSelectedDiff = d;
  renderPanelDiffs();
  document.getElementById('custom-inputs').classList.toggle('show', d === '4');
  document.getElementById('custom-strategy').classList.toggle('show', d === '4');
  if (d === '4') renderCustomStrategy();
}

// ===== 自定义策略配置 =====
const STRAT_LABELS = ['', '招募升级','招募','买跳板','升级跳板','一键升级','一键合成','招募100','一键合成','升级弹板','合成'];
// 短标签用于显示，完整名称用 title
const STRAT_FULL = ['', '招募升级','招募小球','购买跳板','升级跳板','一键升级（弹跳板）','一键合成升级','招募100小球','一键合成（全部）','升级弹跳板','合成'];
let customStratSelected = {}; // { 'p1': {1:true,2:true,3:true}, 'p2':{...}, 'p3':{...} }

function renderCustomStrategy() {
  ['p1','p2','p3'].forEach(pid => {
    const container = document.getElementById('strat-' + pid);
    if (!customStratSelected[pid]) customStratSelected[pid] = {};
    let h = '';
    for (let i = 1; i <= 10; i++) {
      const sel = customStratSelected[pid][i];
      h += `<label class="${sel?'checked':''}" onclick="toggleStrat('${pid}',${i})" title="${i}.${STRAT_FULL[i]}">${i}.${STRAT_LABELS[i]}</label>`;
    }
    container.innerHTML = h;
  });
}
function toggleStrat(pid, id) {
  if (!customStratSelected[pid]) customStratSelected[pid] = {};
  const cur = customStratSelected[pid][id];
  if (cur) { customStratSelected[pid][id] = false; }
  else {
    const cnt = Object.values(customStratSelected[pid]).filter(Boolean).length;
    if (cnt >= 3) { showToast('每个优先级最多选3个', 'error'); return; }
    // 从其他优先级移除（不可重复选）
    ['p1','p2','p3'].forEach(op => {
      if (op !== pid && customStratSelected[op] && customStratSelected[op][id]) {
        customStratSelected[op][id] = false;
      }
    });
    customStratSelected[pid][id] = true;
  }
  renderCustomStrategy();
}
function resetCustomStrategy() {
  customStratSelected = {};
  renderCustomStrategy();
  showToast('已设为默认（轮流所有功能）', 'info');
}
function getCustomStrategyTiers() {
  // 返回 [[id,id,id], [id,id,id], [id,id,id]] 或 null（表示默认轮流）
  const result = [];
  let hasAny = false;
  ['p1','p2','p3'].forEach(pid => {
    const ids = [];
    for (let i = 1; i <= 10; i++) {
      if (customStratSelected[pid] && customStratSelected[pid][i]) ids.push(i);
    }
    if (ids.length > 0) hasAny = true;
    result.push(ids);
  });
  return hasAny ? result : null;
}
function showChallengePanel() {
  document.getElementById('challenge-config').classList.add('show');
  renderPanelLetters();
  renderPanelDiffs();
}
function backToModeSelect() {
  document.getElementById('challenge-config').classList.remove('show');
}
function backToHome() {
  stopComputerAI();
  gameState.running = false;
  gameState.mode = 'personal';
  gameState.computer = null;
  gameState.challengeWinner = null;
  gameState.playerCoinMult = 1.0;
  gameState.computerCoinMult = 1.0;
  document.getElementById('victory-dialog').classList.remove('show');
  document.getElementById('mode-overlay').classList.remove('hidden');
  document.getElementById('challenge-config').classList.remove('show');
}
function onVictoryConfirm() {
  document.getElementById('victory-dialog').classList.remove('show');
  backToHome();
}
function selectMode(mode) {
  document.getElementById('mode-overlay').classList.add('hidden');
  if (mode === 'personal') {
    const loaded = loadGame();
    if (loaded) {
      if (gameState.currentStage === 0 && gameState.bouncePads.length === 0) initBouncePads();
      showToast('游戏已恢复（第' + gameState.currentStage + '关）', 'info');
    } else {
      initBouncePads();
      for (let i = 0; i < 2; i++) {
        gameState.balls.push({
          x: 370 + i * 60, y: 140,
          vx: (i === 0 ? 3 : -2.5), vy: 0.5,
          radius: 14, level: 1,
          color: getBallColor(1), isActive: true
        });
      }
    }
    updateUI();
    gameState.running = true;
    gameLoop();
  }
}
function startChallengeFromPanel() {
  const stageIndex = panelLetters.indexOf(panelSelectedLetter) + 1;
  const diff = parseInt(panelSelectedDiff);
  let playerMult, computerMult, customTiers = null;
  if (diff === 4) {
    const pv = parseInt(document.getElementById('custom-player').value);
    const cv = parseInt(document.getElementById('custom-computer').value);
    if (pv < 5 || pv > 100000 || isNaN(pv) || cv < 5 || cv > 100000 || isNaN(cv)) {
      showAlert('输入超出范围(5~100000)！\n请点击确认后重新输入');
      return;
    }
    playerMult = pv / 100;
    computerMult = cv / 100;
    customTiers = getCustomStrategyTiers();
    // 验证：使用自定义策略时，每个优先级至少选1个
    if (customTiers && customTiers.some(t => t.length === 0)) {
      showAlert('使用自定义策略时，每个优先级至少选1个功能！\n或点击"默认"使用轮流模式');
      return;
    }
  }
  document.getElementById('mode-overlay').classList.add('hidden');
  initChallengeMode(stageIndex, diff, playerMult, computerMult, customTiers);
  updateUI();
  gameState.running = true;
  startComputerAI();
  gameLoop();
  showToast('挑战模式：玩家 vs 电脑（玩家×' + gameState.playerCoinMult.toFixed(2) + ' 电脑×' + gameState.computerCoinMult.toFixed(2) + '）', 'info');

}

// ==================== 启动 ====================
function startGame() {
  const params = new URLSearchParams(window.location.search);
  const urlMode = params.get('mode');
  const urlStage = parseInt(params.get('stage'));
  const urlDiff = parseInt(params.get('diff'));

  if (urlMode === 'challenge' && urlStage >= 1 && urlStage <= 26 && urlDiff >= 0 && urlDiff <= 4) {
    // 有URL参数，直接启动挑战模式
    document.getElementById('mode-overlay').classList.add('hidden');
    const urlPlayMult = parseFloat(params.get('pm')) || null;
    const urlCompMult = parseFloat(params.get('cm')) || null;
    initChallengeMode(urlStage, urlDiff, urlPlayMult, urlCompMult);
    updateUI();
    gameState.running = true;
    startComputerAI();
    gameLoop();
    showToast('挑战模式：玩家 vs 电脑（玩家×' + gameState.playerCoinMult.toFixed(2) + ' 电脑×' + gameState.computerCoinMult.toFixed(2) + '）', 'info');
    return;
  }

  if (urlMode === 'personal') {
    // 有URL参数，直接启动个人模式
    document.getElementById('mode-overlay').classList.add('hidden');
    const loaded = loadGame();
    if (loaded) {
      if (gameState.currentStage === 0 && gameState.bouncePads.length === 0) initBouncePads();
      showToast('游戏已恢复（第' + gameState.currentStage + '关）', 'info');
    } else {
      initBouncePads();
      for (let i = 0; i < 2; i++) {
        gameState.balls.push({
          x: 370 + i * 60, y: 140,
          vx: (i === 0 ? 3 : -2.5), vy: 0.5,
          radius: 14, level: 1,
          color: getBallColor(1), isActive: true
        });
      }
    }
    updateUI();
    gameState.running = true;
    gameLoop();
    return;
  }

  // 无URL参数：显示模式选择覆盖层（不做其他事）
}
startGame();
</script>
